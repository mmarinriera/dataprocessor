name: Semantic Versioning

on:
  push:
    branches:
      - main

env:
  UV_VERSION: "0.10"

jobs:
  semantic_version:
    runs-on: 
      - ubuntu-latest
    concurrency: release
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: |
          uv tool install "python-semantic-release>=10.2.0"

      - name: Bump version and create tag
        id: bump_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          psr version --no-vcs-release
